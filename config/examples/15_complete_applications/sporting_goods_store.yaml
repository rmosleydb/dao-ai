# =============================================================================
# EVALUATION
# =============================================================================
evaluation:
  model: *judge_llm
  table:
    schema: *sporting_goods_schema
    name: evaluation
  num_evals: 25
  replace: false
  agent_description: |
    A multi-agent Merchandiser 360 system for a sporting goods retailer (similar to Dick's Sporting Goods).
    The system has 7 specialized agents covering the full merchandising lifecycle:
    1. Assortment Planning - manages category mix, planograms, and seasonal product transitions
    2. Forecasting - demand prediction, trend analysis, and stockout risk assessment
    3. Purchase Order - PO management, vendor relations, buying decisions, and receiving
    4. Pricing - pricing strategy, markdowns, promotions, competitive pricing, and clearance
    5. Sales - sales performance analytics, store comparisons, revenue tracking, and returns
    6. Inventory - stock levels, replenishment, allocation, and product availability
    7. General - product information, store inquiries, and general assistance
    The system serves merchandisers, buyers, store managers, and analysts managing sporting goods
    across categories like athletic footwear, apparel, team sports, fitness equipment, outdoor/camping,
    cycling, golf, and accessories from brands like Nike, Adidas, Under Armour, The North Face, etc.
  question_guidelines: |
    # User personas
    - A merchandiser planning the seasonal assortment for footwear and apparel
    - A buyer managing purchase orders and vendor relationships
    - A pricing analyst reviewing markdown effectiveness and promotional ROI
    - A store manager checking inventory levels and sales performance
    - A demand planner forecasting seasonal trends for outdoor and camping gear

    # Example questions
    - What products have critical stockout risk across our stores?
    - How did the Spring Running promotion perform on Nike Pegasus?
    - What is the demand forecast for camping equipment this summer?
    - Which purchase orders are overdue from Nike?
    - Compare sales performance between Denver flagship and Portland stores
    - What markdowns should we take on winter outerwear?
    - Show me the top 10 selling products by revenue this month
    - What is our current inventory position on Adidas Ultraboost?
    - Which categories have the highest margin percentage?
    - Plan the fall assortment transition for outdoor gear

    # Additional Guidelines
    - Questions should reflect real merchandising workflows and decisions
    - Include questions spanning all 7 agent specializations
    - Mix operational questions (stock checks) with strategic questions (assortment planning)
    - Include seasonal context in questions where appropriate
    - Reference specific brands, products, and stores from the catalog
  custom_inputs:
    configurable:
      user_id: merchandiser_01
      store_num: DEN-FLAG
    session: {}
  guidelines:
    - name: merchandising_relevance
      guidelines:
        - Responses should be relevant to sporting goods merchandising operations
        - Recommendations should reference specific products, brands, or categories from the catalog
        - Pricing and inventory data should be accurate and sourced from tool results
        - Seasonal context should be considered in all merchandising recommendations

